name = "parami-landing"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# Routes
routes = [
  { pattern = "parami.makeloops.xyz/*", zone_name = "makeloops.xyz" }
]

# Static assets — served from ./public
[assets]
directory = "./public"

# Environment variables (non-secret)
[vars]
ENVIRONMENT = "production"
SITE_NAME = "Parami"

# Production environment
[env.production]
routes = [
  { pattern = "parami.makeloops.xyz/*", zone_name = "makeloops.xyz" }
]

# Staging environment
[env.staging]
routes = [
  { pattern = "parami-staging.makeloops.xyz/*", zone_name = "makeloops.xyz" }
]
